  <style>
    /* ── 디자인 시스템: 슬랙 · 컬러풀 ── */
    :root {
      --primary: #4A154B;
      --accent: #1264A3;
      --green: #2EB67D;
      --yellow: #ECB22E;
      --text: #1D1C1D;
      --bg: #FFFFFF;
      --border: #E8E8E8;
      --surface: #F8F8F8;
      --radius-card: 16px;
      --shadow: 0 2px 12px rgba(0,0,0,.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      color: var(--text);
      background: var(--bg);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── 페이지 전환 애니메이션 ── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    main { animation: fadeInUp .35s ease-out; }

    /* ── 스크롤 시 헤더 그림자 (JS에서 토글) ── */
    .header--scrolled { box-shadow: 0 2px 12px rgba(0,0,0,.15); }

    h1, h2, h3, h4 { font-weight: 700; line-height: 1.3; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    img { max-width: 100%; display: block; }

    /* ── 버튼: 둥근 알약 ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 12px 22px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 700;
      background: var(--primary);
      color: #fff;
      border: none;
      cursor: pointer;
      transition: filter .15s, transform .15s;
    }
    .btn:hover { filter: brightness(.92); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn--accent { background: var(--accent); }
    .btn--green  { background: var(--green); }
    .btn--yellow { background: var(--yellow); color: var(--text); }
    .btn--outline {
      background: transparent;
      color: var(--primary);
      border: 2px solid var(--primary);
    }
    .btn--outline:hover { background: var(--primary); color: #fff; }

    /* ── 레이아웃 ── */
    .container { max-width: 1080px; margin: 0 auto; padding: 0 20px; }

    /* ── 헤더 ── */
    .header {
      background: var(--primary);
      color: #fff;
      padding: 16px 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header__inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .header__logo {
      font-size: 22px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #fff;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
    }
    .header__logo:hover { opacity: .9; }
    .header__nav { display: flex; align-items: center; gap: 12px; }
    .header__nav-btn {
      color: #fff;
      border-color: rgba(255,255,255,.4);
      padding: 8px 18px;
      font-size: 13px;
    }

    /* ── 푸터 ── */
    .footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 32px 0;
      margin-top: 80px;
      text-align: center;
      color: #888;
      font-size: 14px;
    }
    .footer__links { display: flex; justify-content: center; gap: 16px; margin-top: 12px; flex-wrap: wrap; }
    .footer__links button { background: none; border: none; color: #888; font-size: 13px; cursor: pointer; font-family: 'Inter', sans-serif; padding: 0; }
    .footer__links button:hover { color: var(--accent); text-decoration: underline; }
    .policy-page { max-width: 680px; margin: 0 auto; padding: 40px 20px; }
    .policy-page h2 { font-size: 24px; margin-bottom: 24px; color: var(--primary); }
    .policy-page h3 { font-size: 17px; margin: 24px 0 8px; color: var(--text); }
    .policy-page p, .policy-page li { font-size: 15px; line-height: 1.8; color: #444; margin-bottom: 8px; }
    .policy-page ul { padding-left: 20px; margin-bottom: 16px; }
    .policy-page .back-btn { margin-bottom: 24px; }

    /* ── 히어로 ── */
    .hero { text-align: center; padding: 60px 0 40px; }
    .hero h1 { font-size: 36px; margin-bottom: 12px; }
    .hero p { font-size: 18px; color: #666; max-width: 520px; margin: 0 auto; }

    /* ── 학년 선택 그리드 ── */
    .grade-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      padding-bottom: 40px;
    }
    .grade-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 36px 24px;
      cursor: pointer;
      border: 2px solid var(--border);
      border-radius: var(--radius-card);
      background: var(--bg);
      text-align: center;
      font-family: inherit;
      box-shadow: var(--shadow);
      transition: transform .2s, box-shadow .2s, border-color .2s;
    }
    .grade-card:hover {
      border-color: var(--grade-color);
      transform: translateY(-6px);
      box-shadow: 0 12px 32px rgba(0,0,0,.1);
    }
    .grade-card__emoji { font-size: 42px; line-height: 1; }
    .grade-card__label { font-size: 22px; font-weight: 700; color: var(--text); }
    .grade-card__sub { font-size: 13px; color: #888; font-weight: 500; }

    /* ── 추천 페이지 ── */
    .recommend-header {
      text-align: center;
      padding: 48px 0 32px;
    }
    .recommend-header__badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 16px;
      font-size: 14px;
      font-weight: 500;
      color: #666;
      margin-bottom: 16px;
    }
    .recommend-header h1 {
      font-size: 30px;
      margin-bottom: 8px;
    }
    .recommend-header p {
      font-size: 16px;
      color: #888;
    }

    .today-card {
      max-width: 720px;
      margin: 0 auto 48px;
      border-radius: var(--radius-card);
      border: 2px solid var(--border);
      background: var(--bg);
      box-shadow: 0 4px 20px rgba(0,0,0,.08);
      overflow: hidden;
    }
    .today-card__top {
      display: flex;
      gap: 28px;
      padding: 32px;
    }
    .today-card__cover {
      width: 140px;
      min-height: 190px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 56px;
      flex-shrink: 0;
    }
    .today-card__info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .today-card__label {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      background: var(--green);
      border-radius: 999px;
      padding: 4px 12px;
      width: fit-content;
    }
    .today-card__title {
      font-size: 24px;
      font-weight: 700;
      line-height: 1.3;
    }
    .today-card__author {
      font-size: 14px;
      color: #888;
    }
    .today-card__meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 4px;
    }
    .tag--comic {
      background: #FF6B6B !important;
      color: #fff !important;
      border-color: #FF6B6B !important;
    }
    .book-list-item__comic {
      display: inline-block;
      background: #FF6B6B;
      color: #fff;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 999px;
      font-weight: 700;
      margin-left: 6px;
      vertical-align: middle;
    }
    .today-card__tag {
      font-size: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 10px;
      color: #666;
    }
    .today-card__reason {
      background: var(--surface);
      padding: 24px 32px;
      border-top: 1px solid var(--border);
    }
    .today-card__reason-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .today-card__reason-text {
      font-size: 15px;
      line-height: 1.7;
      color: #444;
    }

    /* ── 리뷰 영역 ── */
    .review-section {
      padding: 20px 32px 24px;
      border-top: 1px solid var(--border);
    }
    .review-section__title {
      font-size: 14px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .review-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
    }
    .review-item:last-child { margin-bottom: 0; }
    .review-item__header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .review-item__avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .review-item__name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }
    .review-item__stars {
      font-size: 12px;
      margin-left: auto;
      color: var(--yellow);
    }
    .review-item__text {
      font-size: 14px;
      line-height: 1.6;
      color: #555;
    }

    /* ── 오늘의 도서 새로고침 버튼 ── */
    .refresh-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: #666;
      cursor: pointer;
      transition: all .2s;
      margin-top: 12px;
    }
    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
    .refresh-btn svg { transition: transform .3s; }
    .refresh-btn:hover svg { transform: rotate(180deg); }

    /* ── 구매 링크 버튼 ── */
    .buy-links {
      padding: 0 32px 24px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .buy-links__title {
      width: 100%;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .buy-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      transition: all .15s;
    }
    .buy-link:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      text-decoration: none;
    }

    /* 모달 내 리뷰/구매 */
    .modal__reviews { padding: 16px 28px; border-top: 1px solid var(--border); }
    .modal__reviews .review-section__title { margin-bottom: 10px; }
    .modal__buy { padding: 0 28px 20px; display: flex; gap: 8px; flex-wrap: wrap; }

    .other-books {
      max-width: 720px;
      margin: 0 auto;
      padding-bottom: 20px;
    }
    .other-books__title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .book-list-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 10px;
      background: var(--bg);
      transition: box-shadow .2s, transform .15s;
    }
    .book-list-item:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,.08);
      transform: translateY(-2px);
    }
    .book-list-item__cover {
      width: 48px;
      height: 64px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }
    .book-list-item__info { flex: 1; }
    .book-list-item__title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 2px;
    }
    .book-list-item__author {
      font-size: 13px;
      color: #888;
    }
    .book-list-item__day {
      font-size: 12px;
      color: #aaa;
      white-space: nowrap;
    }

    .book-list-item--today {
      border-color: var(--green);
      background: #f0faf5;
    }
    .book-list-item--hidden { display: none; }
    .book-list-item--read { opacity: .55; }
    .book-list-item--read .book-list-item__title::after {
      content: ' ✅';
      font-size: 13px;
    }

    /* ── 읽기 진행률 바 ── */
    .progress-bar {
      max-width: 720px;
      margin: 0 auto 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .progress-bar__label {
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      color: var(--text);
    }
    .progress-bar__track {
      flex: 1;
      height: 10px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-bar__fill {
      height: 100%;
      background: var(--green);
      border-radius: 999px;
      transition: width .4s ease;
    }
    .progress-bar__count {
      font-size: 13px;
      color: #888;
      white-space: nowrap;
    }

    /* ── 도서 상세 모달 ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeIn .2s ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: var(--bg);
      border-radius: var(--radius-card);
      max-width: 520px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 16px 48px rgba(0,0,0,.2);
      animation: modalSlide .25s ease-out;
    }
    @keyframes modalSlide {
      from { opacity: 0; transform: translateY(20px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .modal__header {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      padding: 28px 28px 0;
    }
    .modal__cover {
      width: 100px;
      height: 136px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      flex-shrink: 0;
    }
    .modal__info { flex: 1; }
    .modal__title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .modal__author {
      font-size: 14px;
      color: #888;
      margin-bottom: 8px;
    }
    .modal__tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .modal__tag {
      font-size: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 3px 10px;
      color: #666;
    }
    .modal__reason {
      padding: 20px 28px;
      margin-top: 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    .modal__reason-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .modal__reason-text {
      font-size: 15px;
      line-height: 1.7;
      color: #444;
    }
    .modal__actions {
      display: flex;
      gap: 10px;
      padding: 20px 28px;
      border-top: 1px solid var(--border);
    }
    .modal__actions .btn { flex: 1; justify-content: center; font-size: 14px; }
    .modal__close {
      position: absolute;
      right: 16px;
      top: 16px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--surface);
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888;
      transition: background .15s;
    }
    .modal__close:hover { background: var(--border); }

    /* ── 즐겨찾기/읽음 아이콘 버튼 ── */
    .book-list-item__actions {
      display: flex;
      gap: 4px;
      margin-left: 8px;
    }
    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all .15s;
      padding: 0;
      flex-shrink: 0;
    }
    .icon-btn:hover { background: var(--surface); }
    .icon-btn--active { border-color: var(--yellow); background: #FFF8E1; }
    .icon-btn--read-active { border-color: var(--green); background: #E8F5E9; }

    /* ── 검색/필터 바 ── */
    .search-bar {
      max-width: 720px;
      margin: 0 auto 20px;
    }
    .search-bar__input-wrap {
      position: relative;
      margin-bottom: 12px;
    }
    .search-bar__icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #aaa;
      pointer-events: none;
    }
    .search-bar__input {
      width: 100%;
      padding: 12px 16px 12px 44px;
      border: 2px solid var(--border);
      border-radius: 999px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color .2s;
      background: var(--bg);
      color: var(--text);
    }
    .search-bar__input:focus { border-color: var(--accent); }
    .search-bar__input::placeholder { color: #bbb; }

    .search-bar__controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;

      color: #888;

      font-size: 13px;
      font-weight: 500;
      color: #666;

      transition: all .15s;

      background: var(--accent);

      border: 1px solid var(--border);

      font-size: 13px;
      color: #666;
      background: var(--bg);
      cursor: pointer;
      outline: none;

      color: #aaa;
      margin-top: 8px;
    }
    .search-bar__no-result {
      text-align: center;
      padding: 40px 0;
      color: #aaa;
      font-size: 15px;

    .category-header {
      text-align: center;
      padding: 48px 0 24px;

      font-weight: 700;
      padding: 6px 16px;

      font-weight: 700;
      color: var(--text);
      margin: 0 0 8px;
    }
    .category-header p {
      font-size: 15px;
      color: #888;
      margin: 0;
    }
    .category-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 600px;
      margin: 0 auto;
      padding-bottom: 24px;
    }
    .category-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 40px 24px;
      border-radius: 16px;
      border: 2px solid var(--border);
      background: var(--bg);
      cursor: pointer;
      transition: transform .2s, box-shadow .2s, border-color .2s;
      text-align: center;
    }
    .category-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 32px rgba(0,0,0,.1);

    .category-card__label { font-size: 22px; font-weight: 700; color: var(--text); }
    .category-card__desc { font-size: 13px; color: #888; font-weight: 500; line-height: 1.5; }
    .category-card__count {
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      padding: 4px 12px;
      border-radius: 999px;
    }
    .category-card--lit .category-card__count { background: var(--primary); }
    .category-card--nonlit .category-card__count { background: var(--accent); }
    .category-all-btn {
      display: block;
      margin: 0 auto 40px;
      padding: 12px 32px;
      border-radius: 999px;
      border: 2px solid var(--border);
      background: var(--bg);

      font-size: 15px;
      font-weight: 600;
      color: var(--text);

      .category-card__emoji { font-size: 36px; }
      .category-card__label { font-size: 18px; }

    }

    function getReviews(grade, idx) {
      var seed = grade * 100 + idx;
      var count = 2 + (seed % 2);
      var reviews = [];
      for (var r = 0; r < count; r++) {
        var ni = (seed * 7 + r * 13) % REVIEW_NAMES.length;
        var ti = (seed * 11 + r * 17) % REVIEW_TEMPLATES.length;
        var stars = 4 + ((seed + r) % 2);
        var reviewer = REVIEW_NAMES[ni];
        reviews.push({
          name: reviewer.name,
          emoji: reviewer.emoji,
          bg: reviewer.bg,
          grade: 1 + ((seed + r * 3) % 6),
          stars: stars,
          text: REVIEW_TEMPLATES[ti]
        });
      }
      return reviews;
    }

    function renderStars(n) {
      var s = '';
      for (var i = 0; i < 5; i++) s += i < n ? '★' : '☆';
      return s;
    }

    function renderReviewsHtml(grade, idx) {
      var reviews = getReviews(grade, idx);
      var html = '<div class="review-section__title">\u{1F4AC} 독자 리뷰</div>';
      for (var r = 0; r < reviews.length; r++) {
        var rv = reviews[r];
        html += '<div class="review-item">' +
          '<div class="review-item__header">' +
            '<div class="review-item__avatar" style="background:' + rv.bg + '">' + rv.emoji + '</div>' +
            '<span class="review-item__name">' + rv.name + ' (' + rv.grade + '학년)</span>' +
            '<span class="review-item__stars">' + renderStars(rv.stars) + '</span>' +
          '</div>' +
          '<div class="review-item__text">' + rv.text + '</div>' +
        '</div>';
      }
      return html;
    }

    // ── 구매 URL 생성 ──
    function getBuyLinks(title) {
      var encoded = encodeURIComponent(title);
      return [
        {name:'YES24', url:'https://www.yes24.com/Product/Search?domain=ALL&query=' + encoded},
        {name:'교보문고', url:'https://search.kyobobook.co.kr/search?keyword=' + encoded},
        {name:'알라딘', url:'https://www.aladin.co.kr/search/wsearchresult.aspx?SearchWord=' + encoded}
      ];
    }

    function renderBuyLinksHtml(title) {
      var links = getBuyLinks(title);
      var html = '';
      for (var i = 0; i < links.length; i++) {
        html += '<a class="buy-link" href="' + links[i].url + '" target="_blank" rel="noopener">' +
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>' +
          links[i].name +
        '</a>';
      }
      return html;
    }

    // ── 오늘의 도서 새로고침 (세션 내 오프셋) ──
    var refreshOffsets = {};
    function getRefreshOffset(grade) { return refreshOffsets[grade] || 0; }
    function refreshToday(grade, category) {
      category = category || '전체';
      var filtered = getFilteredBooks(grade, category);
      refreshOffsets[grade] = (getRefreshOffset(grade) + 1) % filtered.length;
      navigate('recommend', {grade: grade, category: category});
    }

    // ── 로컬스토리지 유틸 ──
    function storageKey(type, grade, idx) { return 'book_' + type + '_' + grade + '_' + idx; }

    function isRead(grade, idx) {
      return localStorage.getItem(storageKey('read', grade, idx)) === '1';
    }
    function toggleRead(grade, idx) {
      var key = storageKey('read', grade, idx);
      if (localStorage.getItem(key) === '1') localStorage.removeItem(key);
      else localStorage.setItem(key, '1');
    }
    function isFav(grade, idx) {
      return localStorage.getItem(storageKey('fav', grade, idx)) === '1';
    }
    function toggleFav(grade, idx) {
      var key = storageKey('fav', grade, idx);
      if (localStorage.getItem(key) === '1') localStorage.removeItem(key);
      else localStorage.setItem(key, '1');
    }
    function getReadCount(grade) {
      var count = 0;
      for (var i = 0; i < BOOKS[grade].length; i++) {
        if (isRead(grade, i)) count++;
      }
      return count;
    }

    // ── 모달 ──
    function openModal(grade, idx) {
      var book = BOOKS[grade][idx];
      var cc = COVER_COLORS[idx % COVER_COLORS.length];
      var be = BOOK_EMOJI[idx % BOOK_EMOJI.length];
      var read = isRead(grade, idx);
      var fav = isFav(grade, idx);

      var tagsHtml = '';
      for (var t = 0; t < book.tags.length; t++) {
        tagsHtml += '<span class="modal__tag">' + book.tags[t] + '</span>';
      }
      if (book.comic) tagsHtml += '<span class="modal__tag tag--comic">\u{1F4D6} 만화</span>';

      var overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.id = 'modalOverlay';
      overlay.innerHTML =
        '<div class="modal" onclick="event.stopPropagation()">' +
          '<div class="modal__header">' +
            '<div class="modal__cover" style="background:' + cc + '">' + be + '</div>' +
            '<div class="modal__info">' +
              '<div class="modal__title">' + book.title + '</div>' +
              '<div class="modal__author">' + book.author + '</div>' +
              '<div class="modal__tags">' + tagsHtml + '</div>' +
            '</div>' +
          '</div>' +
          '<div class="modal__reason">' +
            '<div class="modal__reason-label">\u{1F4A1} 이 책을 추천하는 이유</div>' +
            '<p class="modal__reason-text">' + book.reason + '</p>' +
          '</div>' +
          '<div class="modal__reviews review-section">' +
            renderReviewsHtml(grade, idx) +
          '</div>' +
          '<div class="modal__buy buy-links">' +
            '<div class="buy-links__title">\u{1F6D2} 이 책 구매하기</div>' +
            renderBuyLinksHtml(book.title) +
          '</div>' +
          '<div class="modal__actions">' +
            '<button class="btn ' + (read ? 'btn--green' : 'btn--outline') + '" onclick="onModalRead(' + grade + ',' + idx + ')">' +
              (read ? '✅ 읽었어요' : '\u{1F4D6} 읽음 표시') +
            '</button>' +
            '<button class="btn ' + (fav ? 'btn--yellow' : 'btn--outline') + '" onclick="onModalFav(' + grade + ',' + idx + ')">' +
              (fav ? '\u{1F49B} 즐겨찾기' : '\u{1F90D} 즐겨찾기') +
            '</button>' +
          '</div>' +
        '</div>';
      overlay.addEventListener('click', closeModal);
      document.body.appendChild(overlay);
      document.body.style.overflow = 'hidden';

    function closeModal() {
      var el = document.getElementById('modalOverlay');
      if (el) el.remove();
      document.body.style.overflow = '';
    }

    function onModalRead(grade, idx) {
      toggleRead(grade, idx);
      closeModal();
      refreshBookList(grade);
    }

    function onModalFav(grade, idx) {
      toggleFav(grade, idx);
      closeModal();
      openModal(grade, idx);
    }

    function refreshBookList(grade) {
      var container = document.getElementById('bookListContainer');
      if (!container) return;
      var items = container.querySelectorAll('.book-list-item');
      items.forEach(function(el) {
        var i = parseInt(el.dataset.idx);
        if (isRead(grade, i)) el.classList.add('book-list-item--read');
        else el.classList.remove('book-list-item--read');
      });
      updateProgress(grade);
    }

    function updateProgress(grade) {
      var fill = document.getElementById('progressFill');
      var countEl = document.getElementById('progressCount');
      if (!fill || !countEl) return;
      var total = BOOKS[grade].length;
      var read = getReadCount(grade);
      fill.style.width = (read / total * 100) + '%';
      countEl.textContent = read + ' / ' + total + '권 읽음';
    }

    function getTodayBookIndex(grade) {
      var today = new Date();
      var start = new Date(today.getFullYear(), 0, 0);
      var dayOfYear = Math.floor((today - start) / 86400000);
      return (dayOfYear + grade) % BOOKS[grade].length;
    }

    var currentPage = 'home';
    var currentParams = {};

    function pageToHash(page, params) {
      params = params || {};
      if (page === 'home') return '#/';
      if (page === 'category') return '#/grade/' + params.grade;
      if (page === 'recommend') {
        var cat = params.category || '전체';
        if (cat === '문학') return '#/grade/' + params.grade + '/literature';
        if (cat === '비문학') return '#/grade/' + params.grade + '/non-literature';
        return '#/grade/' + params.grade + '/all';
      }
      if (page === 'privacy') return '#/privacy';
      if (page === 'about') return '#/about';
      if (page === 'contact') return '#/contact';
      return '#/';
    }

    function hashToPage(hash) {
      hash = hash || '#/';
      var parts = hash.replace('#/', '').split('/');
      if (parts[0] === 'grade' && parts[1]) {
        var g = parseInt(parts[1]);
        if (parts[2] === 'literature') return {page:'recommend', params:{grade:g, category:'문학'}};
        if (parts[2] === 'non-literature') return {page:'recommend', params:{grade:g, category:'비문학'}};
        if (parts[2] === 'all') return {page:'recommend', params:{grade:g, category:'전체'}};
        return {page:'category', params:{grade:g}};
      }
      if (parts[0] === 'privacy') return {page:'privacy', params:{}};
      if (parts[0] === 'about') return {page:'about', params:{}};
      if (parts[0] === 'contact') return {page:'contact', params:{}};

        currentParams = parsed.params;

    var activeTag = null;

    function applyFilters() {
      var query = document.getElementById('searchInput').value.trim().toLowerCase();
      var sortVal = document.getElementById('sortSelect').value;
      var container = document.getElementById('bookListContainer');
      var items = Array.from(container.querySelectorAll('.book-list-item'));
      var visibleCount = 0;

      // 검색 + 태그 필터
      items.forEach(function(el) {
        var title = (el.dataset.title || '').toLowerCase();
        var author = (el.dataset.author || '').toLowerCase();
        var elTags = (el.dataset.tags || '').toLowerCase();

        var matchesQuery = !query || title.indexOf(query) >= 0 || author.indexOf(query) >= 0;
        var matchesTag = !activeTag || elTags.indexOf(activeTag.toLowerCase()) >= 0;

        if (matchesQuery && matchesTag) {
          el.classList.remove('book-list-item--hidden');
          visibleCount++;
        } else {
          el.classList.add('book-list-item--hidden');
        }
      });

      // 정렬
      if (sortVal !== 'default') {
        var visible = items.filter(function(el) { return !el.classList.contains('book-list-item--hidden'); });
        visible.sort(function(a, b) {
          var va, vb;
          if (sortVal === 'title-asc') { va = a.dataset.title; vb = b.dataset.title; }
          else if (sortVal === 'title-desc') { va = b.dataset.title; vb = a.dataset.title; }
          else if (sortVal === 'author-asc') { va = a.dataset.author; vb = b.dataset.author; }
          return va.localeCompare(vb, 'ko');
        });
        visible.forEach(function(el) { container.appendChild(el); });
      }

      // 결과 카운트
      var countEl = document.getElementById('searchCount');
      if (query || activeTag) {
        countEl.textContent = '\u{1F50D} ' + visibleCount + '권 검색됨';
      } else {
        countEl.textContent = '';
      }
    }

    function bindRecommendEvents() {
      var searchInput = document.getElementById('searchInput');
      if (!searchInput) return;

      searchInput.addEventListener('input', applyFilters);
      document.getElementById('sortSelect').addEventListener('change', applyFilters);

      document.querySelectorAll('[data-filter-tag]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var tag = btn.dataset.filterTag;
          if (activeTag === tag) {
            activeTag = null;
            btn.classList.remove('tag-btn--active');
          } else {
            document.querySelectorAll('.tag-btn--active').forEach(function(b) { b.classList.remove('tag-btn--active'); });
            activeTag = tag;
            btn.classList.add('tag-btn--active');
          }
          applyFilters();
        });
      });
    }

    function render() {
      var pageContent = '';
      if (currentPage === 'home') {
        pageContent = renderHomePage();
      } else if (currentPage === 'category') {
        pageContent = renderCategoryPage(currentParams.grade || 1);
      } else if (currentPage === 'recommend') {
        pageContent = renderRecommendPage(currentParams.grade || 1, currentParams.category || '전체');
      } else if (currentPage === 'privacy') {
        pageContent = renderPrivacyPage();
      } else if (currentPage === 'about') {
        pageContent = renderAboutPage();
      } else if (currentPage === 'contact') {
        pageContent = renderContactPage();
      }
      document.getElementById('app').innerHTML =
        renderHeader() + '<main>' + pageContent + '</main>' + renderFooter();

      if (currentPage === 'recommend') {
        activeTag = null;
        bindRecommendEvents();
      }
    }

    window.addEventListener('scroll', function() {
      var header = document.querySelector('.header');
      if (header) {
        if (window.scrollY > 10) header.classList.add('header--scrolled');
        else header.classList.remove('header--scrolled');
      }
    });

    var initState = hashToPage(window.location.hash);
    currentPage = initState.page;
    currentParams = initState.params;
    render();
  </script>
</body>
</html>
